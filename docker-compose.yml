version: "3.8"

services:
  backend:
    build: ./backend
    container_name: hip3-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - TZ=UTC
      - LIQUIDITY_DB_PATH=/data/liquidity.db
      - USERS_DB_PATH=/data/users.db
    volumes:
      - liquidity-data:/data
      - users-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  liquidity-data:
  users-data:
